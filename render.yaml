# render.yaml - Blueprint for the 4Reels Microservices Architecture

services:
  # -------------------------------------------------
  # Service: gally-sessions
  # Description: Manages the WhatsApp connection and provides an API for sending messages.
  # It's a long-running service that maintains the session state.
  # -------------------------------------------------
  - type: web
    name: gally-sessions
    env: node
    region: oregon
    plan: free
    rootDir: ./gally-sessions
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    healthCheckPath: /health
    envVars:
      - fromGroup: 4Reels-secrets # Contains API_KEY, RENDER_API_KEY, and all WA_SESSION_* vars
      # The RENDER_SERVICE_ID for this service must be set manually in the Render dashboard
      # after the first deployment, so it can update its own session.

  # -------------------------------------------------
  # Service: gally-publisher
  # Description: Fetches publication jobs from the database and uses gally-sessions
  # to send them to WhatsApp. This service runs the core business logic.
  # -------------------------------------------------
  - type: web
    name: gally-publisher
    env: node
    region: oregon
    plan: free
    rootDir: ./gally-publisher
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    healthCheckPath: /health
    envVars:
      - fromGroup: 4Reels-secrets # Contains DATABASE_URL, API_KEY, TARGET_CHANNEL_ID
      - key: GALLY_SESSIONS_API_URL
        fromService:
          type: web
          name: gally-sessions