# Force re-sync v1
# render.yaml - Blueprint for the 4Reels Microservices Architecture

services:
  # -------------------------------------------------
  # Service: gally-sessions
  # Description: Manages the WhatsApp connection and provides an API for sending messages.
  # -------------------------------------------------
  - type: web
    name: gally-sessions
    env: node
    region: oregon
    plan: free
    rootDir: ./gally-sessions
    buildCommand: "pnpm install && pnpm build"
    startCommand: "pnpm start"

  # -------------------------------------------------
  # Service: gally-publisher
  # Description: Fetches publication jobs from the database and uses gally-sessions
  # to send them to WhatsApp.
  # -------------------------------------------------
  - type: web
    name: gally-publisher
    env: node
    region: oregon
    plan: free
    rootDir: ./gally-publisher
    buildCommand: "pnpm install && pnpm build"
    startCommand: "pnpm start"
    healthCheckPath: /health
    envVars:
      - fromGroup: 4Reels-secrets # Contains DATABASE_URL, API_KEY, TARGET_CHANNEL_ID
      - key: GALLY_SESSIONS_API_URL
        value: http://gally-sessions